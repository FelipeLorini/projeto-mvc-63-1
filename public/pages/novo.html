<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Novo Produto | Gestão de Produtos</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <nav>
      <a href="/index.html" class="logo">🛒 GestãoProdutos</a>
      <a href="/pages/produtos.html" class="nav-link">Produtos</a>
      <a href="/pages/novo.html" class="btn btn-primary btn-sm">+ Novo Produto</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Novo Produto</h1>
      <a href="/pages/produtos.html" class="btn btn-secondary">← Voltar</a>
    </div>

    <div id="alerta" class="alert hidden"></div>

    <div class="card">
      <form id="formProduto">
        <div class="form-group">
          <label for="nome">Nome do Produto *</label>
          <input type="text" id="nome" name="nome" class="form-control" placeholder="Ex: Camiseta Polo" />
        </div>

        <div class="form-group">
          <label for="descricao">Descrição *</label>
          <textarea id="descricao" name="descricao" class="form-control" rows="3" placeholder="Descreva o produto..."></textarea>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label for="preco">Preço (R$) *</label>
            <input type="number" id="preco" name="preco" class="form-control" step="0.01" min="0" placeholder="0.00" />
          </div>
          <div class="form-group">
            <label for="quantidade">Qtd. em Estoque *</label>
            <input type="number" id="quantidade" name="quantidade" class="form-control" min="0" placeholder="0" />
          </div>
        </div>

        <div class="form-group">
          <label for="categoria">Categoria *</label>
          <input type="text" id="categoria" name="categoria" class="form-control" placeholder="Ex: Vestuário, Eletrônicos..." />
        </div>

        <div class="form-actions">
          <button type="submit" id="btnSalvar" class="btn btn-primary">Salvar Produto</button>
          <a href="/pages/produtos.html" class="btn btn-secondary">Cancelar</a>
        </div>
      </form>
    </div>
  </main>

  <footer>
    <p>Aplicação MVC — Node.js + Express + MongoDB &copy; <span class="ano"></span></p>
  </footer>

  <script src="/js/novo.js"></script>
</body>
</html>
