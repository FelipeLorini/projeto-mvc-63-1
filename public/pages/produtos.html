<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Produtos | Gestão de Produtos</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <nav>
      <a href="/index.html" class="logo">🛒 GestãoProdutos</a>
      <a href="/pages/produtos.html" class="nav-link">Produtos</a>
      <a href="/pages/novo.html" class="btn btn-primary btn-sm">+ Novo Produto</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Lista de Produtos</h1>
      <a href="/pages/novo.html" class="btn btn-primary">+ Adicionar Produto</a>
    </div>

    <div id="alerta" class="alert hidden"></div>

    <div id="loading" class="empty-state">
      <p>Carregando produtos...</p>
    </div>

    <div id="vazio" class="empty-state hidden">
      <p>Nenhum produto cadastrado ainda.</p>
      <a href="/pages/novo.html" class="btn btn-primary">Cadastrar primeiro produto</a>
    </div>

    <div id="tabelaWrapper" class="hidden">
      <table class="tabela">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Categoria</th>
            <th>Preço</th>
            <th>Estoque</th>
            <th>Ações</th>
          </tr>
        </thead>
        <tbody id="corpoTabela"></tbody>
      </table>
    </div>
  </main>

  <footer>
    <p>Aplicação MVC — Node.js + Express + MongoDB &copy; <span class="ano"></span></p>
  </footer>

  <script src="/js/produtos.js"></script>
</body>
</html>
