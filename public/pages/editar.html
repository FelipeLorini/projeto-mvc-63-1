<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Editar Produto | Gestão de Produtos</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

  <header>
    <nav>
      <a href="/index.html" class="logo">🛒 GestãoProdutos</a>
      <a href="/pages/produtos.html" class="nav-link">Produtos</a>
      <a href="/pages/novo.html" class="btn btn-primary btn-sm">+ Novo Produto</a>
    </nav>
  </header>

  <main class="container">
    <div class="page-header">
      <h1>Editar Produto</h1>
      <a id="btnVoltar" href="/pages/produtos.html" class="btn btn-secondary">← Voltar</a>
    </div>

    <div id="alerta" class="alert hidden"></div>
    <div id="loading" class="empty-state"><p>Carregando produto...</p></div>

    <div id="conteudo" class="hidden">
      <div class="card">
        <form id="formEditar">
          <div class="form-group">
            <label for="nome">Nome do Produto *</label>
            <input type="text" id="nome" name="nome" class="form-control" />
          </div>

          <div class="form-group">
            <label for="descricao">Descrição *</label>
            <textarea id="descricao" name="descricao" class="form-control" rows="3"></textarea>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label for="preco">Preço (R$) *</label>
              <input type="number" id="preco" name="preco" class="form-control" step="0.01" min="0" />
            </div>
            <div class="form-group">
              <label for="quantidade">Qtd. em Estoque *</label>
              <input type="number" id="quantidade" name="quantidade" class="form-control" min="0" />
            </div>
          </div>

          <div class="form-group">
            <label for="categoria">Categoria *</label>
            <input type="text" id="categoria" name="categoria" class="form-control" />
          </div>

          <div class="form-actions">
            <button type="submit" class="btn btn-primary">Atualizar Produto</button>
            <a id="btnCancelar" href="#" class="btn btn-secondary">Cancelar</a>
          </div>
        </form>
      </div>
    </div>
  </main>

  <footer>
    <p>Aplicação MVC — Node.js + Express + MongoDB &copy; <span class="ano"></span></p>
  </footer>

  <script src="/js/editar.js"></script>
</body>
</html>
